<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon_io/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon_io/apple-touch-icon.png"
    />
    <title>MiniChat</title>
  </head>

  <body>
    <div class="container">
      <!-- join Screen -->
      <div id="join-screen">
        <div id="logOut">
          <h2>MiniChat</h2>
          <button id="logout-btn">Logout</button>
        </div>

        <p id="welcome-msg"></p>

        <!-- Tabs navigation -->
        <div class="tabs-container">
          <button class="tab-btn active" id="tab-join">Join Room</button>
          <button class="tab-btn" id="tab-create">Create Room</button>
        </div>

        <!-- Join room form -->
        <div id="join-form-container" class="form-container active">
          <input
            type="text"
            id="room-input"
            placeholder="Room Code (e.g. room123)"
            maxlength="20"
          />
          <button id="join-btn">Join Room</button>
        </div>

        <!-- Create room form -->
        <div id="create-form-container" class="form-container">
          <input
            type="text"
            id="create-room-input"
            placeholder="New Room Code (e.g. secretroom)"
            maxlength="20"
          />

          <div class="duration-container">
            <label for="room-duration">Room Duration:</label>
            <select id="room-duration">
              <option value="1">1 Day</option>
              <option value="3">3 Day</option>
            </select>
          </div>

          <button id="create-btn">Create Room</button>
        </div>
      </div>

      <!-- Chat Screen -->
      <div id="chat-screen">
        <!-- side bar overlay for mobile tap to close drawer -->
        <div id="sidebar-overlay"></div>

        <!-- Side bar -->
        <div id="chat-sidebar">
          <h3>Online Users</h3>
          <ul id="users-list"></ul>
        </div>

        <!-- chat area -->
        <div id="chat-area">
          <div id="chat-header">
            <div class="upper-header">
              <div class="header-left">
                <button id="toggle-users-btn">☰</button>
                <h3 id="room-label">Room:</h3>
              </div>
              <button id="leave-btn">Leave Room</button>
            </div>
            <div id="people-count">1 person in this room</div>
          </div>

          <div id="messages">
            <div id="loading-spinner">
              <div id="spinner"></div>
              <span id="loading">Loading messages...</span>
            </div>
          </div>

          <div id="typing-indicator"></div>

          <div id="message-form">
            <div
              style="flex: 1; display: flex; flex-direction: column; gap: 4px"
            >
              <input
                type="text"
                id="message-input"
                placeholder="Type a message..."
              />
              <span
                id="char-count"
                style="font-size: 11px; color: #999; text-align: right"
                >0/1000</span
              >
            </div>
            <button id="send-btn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Socket.io client (served automatically by Socket.io) -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
