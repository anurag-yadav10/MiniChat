<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="icon" type="image/x-icon" href="../favicon_io/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../favicon_io/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../favicon_io/apple-touch-icon.png"
    />
    <title>Register - MiniChat</title>
  </head>
  <body>
    <div class="container">
      <form class="auth-box" id="register-form">
        <h2>Create Account</h2>
        <p>Pick a username that will show on your messages forever.</p>

        <div class="error-message" id="error-msg"></div>

        <input
          type="text"
          id="username-input"
          placeholder="Username (3-20 characters)"
          required
        />
        <input
          type="email"
          id="email-input"
          placeholder="Email address"
          required
        />
        <div class="password-wrapper">
          <input
            type="password"
            id="password-input"
            placeholder="Password (min 8 characters)"
            required
          />
          <button
            type="button"
            id="toggle-password-btn"
            class="toggle-password-btn"
            aria-label="Toggle password visibility"
          >
            <i class="fa-regular fa-eye" id="toggle-icon"></i>
          </button>
        </div>

        <div id="password-rules" style="margin-bottom: 12px">
          <div class="rule" id="rule-length">× At least 8 characters</div>
          <div class="rule" id="rule-upper">× One uppercase letter</div>
          <div class="rule" id="rule-lower">× One lowercase letter</div>
          <div class="rule" id="rule-number">× One number</div>
        </div>

        <button id="register-btn" type="submit">Create Account</button>

        <div class="switch-link">
          Already have an account? <a href="login.html">Log in</a>
        </div>
      </form>
    </div>

    <script src="../js/auth.js"></script>
  </body>
</html>
